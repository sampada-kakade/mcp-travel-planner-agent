<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP Travel Planner</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="header">
          <div>
            <p class="eyebrow">MCP Travel Planner</p>
            <h1>Top travel destinations</h1>
            <p class="subtitle">
              Discover the destinations recommended by the Java travel service.
            </p>
          </div>
          <button id="refreshButton" class="button">Refresh recommendations</button>
        </div>

        <div id="status" class="status" aria-live="polite">
          Loading recommendations...
        </div>

        <ul id="recommendationsList" class="list"></ul>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
